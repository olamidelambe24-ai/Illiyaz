<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#075E54" />
    <meta name="description" content="Illy Tracker — a personal finance tracker for daily expenses, budgets, and investments." />
    <title>Illy Tracker — Personal Finance Tracker</title>

    <!-- Standard + Android icons (manifest handles most of this, these are fallbacks) -->
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/favicon-16.png" />

    <!-- iOS "Add to Home Screen" support — Safari doesn't read the manifest for these -->
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Illy Tracker" />

    <!-- Windows tile color -->
    <meta name="msapplication-TileColor" content="#075E54" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
